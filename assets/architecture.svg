<svg viewBox="0 0 980 240" fill="none" xmlns="http://www.w3.org/2000/svg" width="980" height="240">

  <!-- background -->
  <rect width="980" height="240" fill="#0A0A0A"/>

  <!-- ── BOX 1: Claude Code ────────────────────── -->
  <rect x="20" y="20" width="175" height="120" rx="4" fill="#121212" stroke="#2B2B2B"/>
  <text x="32" y="44" fill="#3D3D3D" font-family="'Courier New', monospace" font-size="8" letter-spacing="3">01</text>
  <text x="32" y="66" fill="#FFFFFF" font-family="'Courier New', monospace" font-size="14" font-weight="700">Claude Code</text>
  <text x="32" y="82" fill="#7A7A7A" font-family="'Courier New', monospace" font-size="9">CLI process</text>
  <line x1="32" y1="94" x2="183" y2="94" stroke="#2B2B2B" stroke-width="1"/>
  <rect x="32" y="103" width="70" height="16" rx="2" fill="none" stroke="#2B2B2B"/>
  <text x="42" y="115" fill="#7A7A7A" font-family="'Courier New', monospace" font-size="8">PreToolUse</text>
  <rect x="108" y="103" width="80" height="16" rx="2" fill="none" stroke="#2B2B2B"/>
  <text x="116" y="115" fill="#7A7A7A" font-family="'Courier New', monospace" font-size="8">SessionStart</text>

  <!-- Arrow 1 forward -->
  <text x="218" y="56" fill="#3D3D3D" font-family="'Courier New', monospace" font-size="8" text-anchor="middle" letter-spacing="1">SPAWN</text>
  <line x1="196" y1="80" x2="256" y2="80" stroke="#2B2B2B" stroke-width="1"/>
  <polygon points="252,75 260,80 252,85" fill="#2B2B2B"/>

  <!-- ── BOX 2: Hook Relay ─────────────────────── -->
  <rect x="260" y="20" width="185" height="120" rx="4" fill="#121212" stroke="#2B2B2B"/>
  <text x="272" y="44" fill="#3D3D3D" font-family="'Courier New', monospace" font-size="8" letter-spacing="3">02</text>
  <text x="272" y="66" fill="#FFFFFF" font-family="'Courier New', monospace" font-size="14" font-weight="700">Hook Relay</text>
  <text x="272" y="82" fill="#7A7A7A" font-family="'Courier New', monospace" font-size="9">hook-cli/src/main.rs</text>
  <line x1="272" y1="94" x2="433" y2="94" stroke="#2B2B2B" stroke-width="1"/>
  <text x="272" y="110" fill="#3D3D3D" font-family="'Courier New', monospace" font-size="9">stdin → enrich → TCP</text>
  <text x="272" y="126" fill="#3D3D3D" font-family="'Courier New', monospace" font-size="9">blocks on PreToolUse</text>

  <!-- Arrow 2 forward -->
  <text x="468" y="56" fill="#3D3D3D" font-family="'Courier New', monospace" font-size="8" text-anchor="middle" letter-spacing="1">JSON · TCP</text>
  <line x1="446" y1="80" x2="506" y2="80" stroke="#2B2B2B" stroke-width="1"/>
  <polygon points="502,75 510,80 502,85" fill="#2B2B2B"/>

  <!-- ── BOX 3: Bridge Server ──────────────────── -->
  <rect x="510" y="20" width="185" height="120" rx="4" fill="#121212" stroke="#2B2B2B"/>
  <text x="522" y="44" fill="#3D3D3D" font-family="'Courier New', monospace" font-size="8" letter-spacing="3">03</text>
  <text x="522" y="66" fill="#FFFFFF" font-family="'Courier New', monospace" font-size="14" font-weight="700">Bridge Server</text>
  <text x="522" y="82" fill="#7A7A7A" font-family="'Courier New', monospace" font-size="9">src-tauri/src/bridge/</text>
  <line x1="522" y1="94" x2="683" y2="94" stroke="#2B2B2B" stroke-width="1"/>
  <text x="522" y="110" fill="#3D3D3D" font-family="'Courier New', monospace" font-size="9">TCP server · state machine</text>
  <text x="522" y="126" fill="#3D3D3D" font-family="'Courier New', monospace" font-size="9">port file → zero config</text>

  <!-- Arrow 3 forward -->
  <text x="718" y="56" fill="#3D3D3D" font-family="'Courier New', monospace" font-size="8" text-anchor="middle" letter-spacing="1">EMIT()</text>
  <line x1="696" y1="80" x2="756" y2="80" stroke="#2B2B2B" stroke-width="1"/>
  <polygon points="752,75 760,80 752,85" fill="#2B2B2B"/>

  <!-- ── BOX 4: Pill UI ────────────────────────── -->
  <rect x="760" y="20" width="200" height="120" rx="4" fill="#121212" stroke="#2B2B2B"/>
  <text x="772" y="44" fill="#3D3D3D" font-family="'Courier New', monospace" font-size="8" letter-spacing="3">04</text>
  <text x="772" y="66" fill="#FFFFFF" font-family="'Courier New', monospace" font-size="14" font-weight="700">Pill UI</text>
  <text x="772" y="82" fill="#7A7A7A" font-family="'Courier New', monospace" font-size="9">src/App.svelte · Svelte 5</text>
  <line x1="772" y1="94" x2="948" y2="94" stroke="#2B2B2B" stroke-width="1"/>
  <rect x="772" y="102" width="76" height="26" rx="4" fill="#1A1A1A" stroke="#2B2B2B"/>
  <text x="810" y="119" fill="#BFBFBF" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" font-weight="700">Allow</text>
  <rect x="854" y="102" width="76" height="26" rx="4" fill="#1A1A1A" stroke="#D81F26" stroke-opacity="0.6"/>
  <text x="892" y="119" fill="#D81F26" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" font-weight="700">Deny</text>

  <!-- ── RETURN PATH (permission flow) ────────── -->
  <line x1="850" y1="141" x2="850" y2="178" stroke="#2B2B2B" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="108" y1="178" x2="850" y2="178" stroke="#2B2B2B" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="108" y1="141" x2="108" y2="178" stroke="#2B2B2B" stroke-width="1" stroke-dasharray="5,3"/>
  <polygon points="103,145 108,137 113,145" fill="#2B2B2B"/>

  <!-- resolve_permission tick at Bridge Server -->
  <line x1="602" y1="141" x2="602" y2="178" stroke="#2B2B2B" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="607" y="163" fill="#3D3D3D" font-family="'Courier New', monospace" font-size="8">resolve_permission</text>

  <!-- TCP directive tick at Hook Relay -->
  <line x1="352" y1="141" x2="352" y2="178" stroke="#2B2B2B" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="222" y="163" fill="#3D3D3D" font-family="'Courier New', monospace" font-size="8">TCP directive</text>

  <!-- Return path label -->
  <text x="490" y="202" fill="#3D3D3D" font-family="'Courier New', monospace" font-size="8" text-anchor="middle" letter-spacing="2">ALLOW / DENY · PERMISSION FLOW</text>

</svg>
